# Run Phase 5 scheduler daily at 10 AM UTC (change to "30 4 * * *" for 10 AM IST)
name: Refresh data (Phase 5 scheduler)

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:  # allow manual run

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow push of updated data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Phase 5 refresh (Phase 1 → Phase 2 → sentinel)
        run: |
          python -m phase_5.run_refresh || true
          # If live scrape failed (e.g. 403), refresh from fixtures so timestamp updates daily
          SCHEMES_COUNT=$(python -c "import json; d=json.load(open('data/schemes.json')); print(len(d.get('schemes',[])))" 2>/dev/null || echo "0")
          if [ ! -f data/schemes.json ] || [ "$SCHEMES_COUNT" = "0" ]; then
            echo "Live scrape failed or empty; using fixtures to update timestamp"
            python -m phase_1.scraper.run --from-dir phase_1/html_fixtures
            python -m phase_2.indexer
          fi
        env:
          PYTHONPATH: .

      - name: Sync api/schemes.json for Vercel
        run: |
          cp data/schemes.json api/schemes.json

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/schemes.json api/schemes.json data/last_indexed_at 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data from scheduler [skip ci]"
            git push
          fi
